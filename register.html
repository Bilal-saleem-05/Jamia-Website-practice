<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./registration.css">
    <title>Jamia Tul Ansar -> Registration form</title>
</head>
<body>
    <header>
        <h1>JAMIA TUL ANSAR</h1>
        <h2>REGISTRATION FORM</h2>
        <h3>ACADEMIC SESSION 2026-27</h3>
    </header>

    <div class="registration_container">
        <form action="">
            <div class="registration_form_row">
                <div class="field">
                <label for="Student Name">Student Name:</label> <input type="text" name="" id="" required>
               </div>
                <div class="field">
                <label for="last Name">Last name</label> <input type="text" name="" id=""> 
                </div>
            </div>

            <div class="registration_form_row">
                <div class="field">
                <label for="Gender">Gender:</label><select name="Applying Class" id=""><option value="Male">Male</option><option value="female">Female</option></select>
                </div>
                <div class="field">
                <label for="DOB">Date of Birth(DOB):</label><input type="date" name="DOB" id="">
                </div>
            </div>

            <div class="registration_form_row">
                <div class="field">
                <label for="B-form Number">B-form Number:</label><input type="text" placeholder="Student B-form Number">
                </div>
                <div class="field">
                <label for="Appling Class">Applying for class</label><select name="Applying Class" id=""><option value="Class1">Class 1</option><option value="Class2">Class 2</option></select>
                </div>
            </div>

            <div class="registration_form_row">
                <div class="field">
                <label for="Father Name">father Name:</label><input type="text">
                </div>
                <div class="field">
                <label for="Mobile Number">Mobile Number:</label><input type="number" name="" id="" minlength="11" maxlength="11">
                </div>
            </div>

               <div class="registration_form_row">
                    <div class="field">  
                    <label for="Upload B-form">Upload B-form</label><input type="file" name="" id="">
                    </div>

                    <div class="field Upload">
                        <div class="photograph">
                        
                        </div>
                     
                     <input type="file" placeholder="Student passportsize photo">
                    </div>
                </div>
                <button><a href="./signup.html">Register for Addmission Test</a></button>
        </form>
    </div>

</body>
</html>
