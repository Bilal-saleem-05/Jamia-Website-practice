<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamia Tul Ansar - Student Admission</title>
<link rel="stylesheet" href="addmissionform.css">
</head>
<body>
<header>
    <h1>Jamia Tul Ansar</h1>
    <h2>Student Admission Form</h2>
    <p>Academic Session 2026–2027</p>
</header>

<main class="container">
    <section class="student-info">
        <h2>Student Information</h2>
    <form>
        <div class="row">
            <div class="field"><label>First Name</label><input type="text"></div>
            <div class="field"><label>Middle Name</label><input type="text"></div>
            <div class="field"><label>Last Name</label><input type="text"></div>
        </div>
    <div class="row">
            <div class="field"><label>Date of Birth</label><input type="date"></div>
            <div class="field"><label>Gender</label><select><option>Male</option><option>Female</option></select></div>
            <div class="field"><label>Admission Class</label><select><option>Nursery</option><option>KG-1</option><option>KG-2</option><option>Class 1</option></select></div>
    </div>
    <div class="row">
            <div class="field"><label>B-Form Number</label><input type="text"></div>
            <div class="field"><label>Blood Group</label><select><option>A+</option><option>O+</option></select></div>
            <div class="field"><label>Religion</label><select><option>Islam</option><option>Other</option></select></div>
    </div>
    <div class="row">
            <div class="field"><label>Nationality</label><input type="text" value="Pakistani"></div>
            <div class="field"><label>Student Mobile (Optional)</label><input type="tel"></div>
            <div class="field"><label>Student Email (Optional)</label><input type="email"></div>
    </div>

    </form>
    1</section>

            <section class="student-info">
    <h2>Parent / Guardian Information</h2>
<form>

    <div class="row">
        <div class="field"><label>Father's Full Name</label><input type="text"></div>
        <div class="field"><label>Father CNIC</label><input type="text" placeholder="42101-1234567-1"></div>
        <div class="field"><label>Occupation</label><input type="text"></div>
    </div>

    <div class="row">
        <div class="field"><label>Mobile Number</label><input type="tel"></div>
        <div class="field"><label>WhatsApp Number</label><input type="tel"></div>
        <div class="field"><label>Email</label><input type="email"></div>
    </div>

    <div class="row">
        <div class="field"><label>Mother's Full Name</label><input type="text"></div>
        <div class="field"><label>Mother CNIC</label><input type="text"></div>
        <div class="field"><label>Occupation</label><input type="text"></div>
    </div>

    <div class="row">
        <div class="field"><label>Mother Mobile</label><input type="tel"></div>
        <div class="field"><label>Mother Email</label><input type="email"></div>
        <div class="field"></div>
    </div>

    <h2>Address Information</h2>

    <div class="row">
        <div class="field"><label>House No.</label><input type="text"></div>
        <div class="field"><label>Street</label><input type="text"></div>
        <div class="field"><label>Area</label><input type="text"></div>
    </div>

    <div class="row">
        <div class="field"><label>City</label><input type="text"></div>
        <div class="field"><label>Province</label><input type="text"></div>
        <div class="field"><label>Postal Code</label><input type="text"></div>
    </div>

    <div class="row">
        <div class="field"><label>Nearest Landmark</label><input type="text"></div>
    </div>

</form>
</section>

<section class="student-info">
    <form>

        <h2>Previous School Information</h2>

    <div class="row">
        <div class="field"><label>Previous School Name</label><input type="text"></div>
        <div class="field"><label>Last Class Passed</label><input type="text"></div>
        <div class="field"><label>Board</label><input type="text"></div>
    </div>

    <div class="row">
        <div class="field"><label>Grade / Percentage</label><input type="text"></div>
        <div class="field"><label>Reason for Leaving</label><input type="text"></div>
        <div class="field"><label>School Leaving Certificate No.</label><input type="text"></div>
    </div>

    <h2>Medical Information</h2>

    <div class="row">
        <div class="field"><label>Blood Group</label><select><option>A+</option><option>A-</option><option>B+</option><option>O+</option></select></div>
        <div class="field"><label>Allergies</label><input type="text"></div>
        <div class="field"><label>Medical Condition</label><input type="text"></div>
    </div>

        <h2>Documents Upload</h2>

    <div class="row">
        <div class="field"><label>Student Photograph</label><input type="file"></div>
        <div class="field"><label>B-Form</label><input type="file"></div>
        <div class="field"><label>Father CNIC</label><input type="file"></div>
    </div>

    <div class="row">
        <div class="field"><label>Previous Result Card</label><input type="file"></div>
        <div class="field"><label>School Leaving Certificate</label><input type="file"></div>
        <div class="field"></div>
    </div>

   

    <p><input type="checkbox" required> I declare that the information provided is true and correct.</p>


<button type="submit">Submit Admission</button>

</form>
</section>

</main>
</body>
</html>
